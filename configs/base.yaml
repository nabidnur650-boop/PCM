seed: 7
device: auto
output_dir: outputs/base

model:
  input_dim: 8
  model_dim: 128
  num_slots: 64
  num_branches: 8
  max_branches: 32
  num_heads: 4
  dropout: 0.1
  max_age: 80
  forget_strategy: adaptive
  forget_threshold: 0.35
  occupancy_dim: 64
  future_steps: 20
  num_sensor_types: 4

loss:
  prediction: 1.0
  memory: 0.25
  counterfactual: 0.2
  uncertainty: 0.1
  occupancy: 0.5
  consistency: 0.1
  risk: 0.2
  planning: 1.0
  diversity_margin: 0.75
  plausibility_radius: 8.0

data:
  history_steps: 20
  future_steps: 20
  num_objects: 12
  samples: 4096
  validation_samples: 512
  occlusion_min: 1
  occlusion_max: 10
  occupancy_dim: 64

training:
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.0001
  gradient_clip: 1.0
  num_workers: 4
  stages:
    - name: masked_pretrain
      epochs: 100
    - name: pcm
      epochs: 80
    - name: counterfactual
      epochs: 30
    - name: joint
      epochs: 30
    - name: planner
      epochs: 10

